services:
  # FastAPI Backend Web Service
  - type: web
    name: neurovolley-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: NeuroVolley AI
      - key: DEBUG
        value: "false"
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        value: sqlite:///var/data/neurovolley.db
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: OUTPUT_DIR
        value: /var/data/output
      - key: STATIC_DIR
        value: /var/data/static
      - key: CALIBRATION_DIR
        value: /var/data/calibration
      - key: RECORDING_DIR
        value: /var/data/recordings
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: CORS_ORIGINS
        value: '["https://frontend-delta-gules-15.vercel.app","http://localhost:3000"]'
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: MAX_UPLOAD_SIZE_MB
        value: "500"
      - key: ALLOWED_VIDEO_EXTENSIONS
        value: '[".mp4",".mov"]'
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
